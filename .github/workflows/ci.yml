name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Audit — no hardcoded secrets in dist
        run: |
          set -e
          if grep -rE 'ed409ba00ee414b81b2703f23a80d6c5e' dist/; then
            echo "❌ Hardcoded do-not-invoice secret found in dist"; exit 1
          fi
          if grep -rE 'hooks\.slack\.com/services/T[A-Z0-9]+' dist/; then
            echo "❌ Hardcoded Slack webhook found in dist"; exit 1
          fi
          if grep -rE 'wak_(live|test)_[A-Za-z0-9]{20,}' dist/; then
            echo "❌ Hardcoded wak_* token found in dist"; exit 1
          fi
          # No JWTs (e.g. a Supabase service_role key — see analytics.ts history)
          if grep -rE 'eyJ[A-Za-z0-9_-]{15,}\.eyJ[A-Za-z0-9_-]{15,}\.[A-Za-z0-9_-]{10,}' dist/; then
            echo "❌ JWT found in dist (possible Supabase/service key)"; exit 1
          fi
          # No Supabase project URLs (analytics must not call Supabase directly)
          if grep -rE '[a-z0-9]{20}\.supabase\.co' dist/; then
            echo "❌ Supabase project URL found in dist"; exit 1
          fi
          # NOTE: the Slack notify proxy (slack.ts) currently points at a
          # *.vercel.app URL. It carries no credential, but it should migrate to
          # a stable Warp domain. Tracked as a follow-up; not a build failure.
          echo "✓ no credential patterns found"

      - name: E2E smoke test
        env:
          WARP_API_KEY: ${{ secrets.WARP_TEST_API_KEY }}
        run: |
          if [ -z "$WARP_API_KEY" ]; then
            echo "WARP_TEST_API_KEY not set in repo secrets — running help/version checks only"
          fi
          node test/e2e.mjs
